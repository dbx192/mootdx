name: Python package

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and tests
        run: python -m pip install --upgrade pip ".[test]"
      - name: Run deterministic test suite
        run: python -m pytest
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
